    <style>
        /* Global Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #00d2ff;
            --secondary: #0ea5e9;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(0,210,255,0.18);
            --bg-dark: #020617;
            --text-muted: #94a3b8;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 0%, #031220 0%, #020617 60%, #020617 100%);
            color: #fff;
            font-family: 'Noto Sans Bengali', 'Segoe UI', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* Top Bar - Premium Feature */
        .top-bar {
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(2, 6, 23, 0.5);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .top-bar span { font-weight: 600; color: var(--primary); }
        .nb-page { width: 100%; display: flex; flex-direction: column; position: relative; }

        /* ── Hero Section ── */
        .bag-hero {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: clamp(30px, 6vw, 60px) 15px;
            text-align: center;
            position: relative;
        }
        .bag-logo svg {
            width: clamp(70px, 12vw, 90px);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(0,210,255,0.5));
            animation: bag-pulse 3s ease-in-out infinite;
        }
        @keyframes bag-pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 12px rgba(0,210,255,0.4)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(0,210,255,0.7)); }
        }
        .bag-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(90deg, #00d2ff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }
        .bag-sub {
            font-size: clamp(0.75rem, 2.5vw, 0.9rem);
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 35px;
        }

        /* ── Search Bar & Voice ── */
        .nb-search-wrap {
            width: 100%;
            max-width: 650px;
            display: flex;
            position: relative;
            margin-bottom: 25px;
        }
        .nb-search-input {
            width: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 18px 100px 18px 25px; 
            border-radius: 50px;
            color: #fff;
            font-size: 1rem;
            font-family: 'Noto Sans Bengali', sans-serif;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .nb-search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }
        .nb-mic-btn {
            position: absolute;
            right: 65px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .nb-mic-btn:hover { color: var(--primary); }
        .nb-mic-btn.recording {
            color: #ef4444;
            animation: pulse-red 1s infinite;
        }
        @keyframes pulse-red {
            0% { transform: translateY(-50%) scale(1); filter: drop-shadow(0 0 5px #ef4444); }
            50% { transform: translateY(-50%) scale(1.1); filter: drop-shadow(0 0 15px #ef4444); }
            100% { transform: translateY(-50%) scale(1); filter: drop-shadow(0 0 5px #ef4444); }
        }
        .nb-search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary), #0284c7);
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0, 210, 255, 0.3);
        }
        .nb-search-btn:hover {
            background: #fff;
            transform: translateY(-50%) scale(1.05);
        }

        /* ── Tags (Short Keywords) ── */
        .bag-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }
        .bag-tag {
            padding: 8px 18px;
            background: rgba(0, 210, 255, 0.05);
            border: 1px solid rgba(0, 210, 255, 0.15);
            border-radius: 100px;
            font-size: 0.85rem;
            color: #cbd5e1;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }
        .bag-tag:hover {
            border-color: var(--primary);
            color: #fff;
            background: rgba(0, 210, 255, 0.15);
            transform: translateY(-2px);
        }

        /* ── Category Grid ── */
        .bag-cats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 15px;
            width: 100%;
            margin-bottom: 50px;
        }
        .bag-cat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .bag-cat-card:hover {
            transform: translateY(-5px);
            background: rgba(0, 210, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.1);
        }
        .bag-cat-icon {
            width: 45px;
            height: 45px;
            background: rgba(0, 210, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: var(--primary);
            transition: 0.3s;
        }
        .bag-cat-card:hover .bag-cat-icon {
            background: var(--primary);
            color: #000;
        }
        .bag-cat-card h4 {
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        /* ── API Trending Section ── */
        .bag-trending-section { width: 100%; text-align: left; }
        .section-head {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .section-head h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: #fff;
            white-space: nowrap;
        }
        .section-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.2) 0%, transparent 100%);
        }
        .trending-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        .trend-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .trend-card:hover {
            background: rgba(0, 210, 255, 0.08);
            border-color: var(--primary);
            transform: translateX(5px);
        }
        .trend-num {
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            opacity: 0.5;
            font-size: 1.2rem;
        }
        .trend-text {
            font-size: 0.9rem;
            color: #e2e8f0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .loading-pulse {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            width: 100%;
            grid-column: 1 / -1;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* ── Footer ── */
        .nb-footer {
            width: 100%;
            padding: 30px 20px;
            background: rgba(2, 6, 23, 0.8);
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            margin-top: 50px;
        }
        .copy { font-size: 0.85rem; color: #64748b; line-height: 1.6; }
        .copy a { color: var(--primary); text-decoration: none; font-weight: bold; }

        /* ── NEW: Filters & Load More Button Styles (Added without modifying old CSS) ── */
        .news-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: flex-start;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
            font-family: 'Noto Sans Bengali', sans-serif;
        }
        .filter-btn.active, .filter-btn:hover {
            background: rgba(0, 210, 255, 0.15);
            border-color: var(--primary);
            color: #fff;
        }
        .load-more-wrap {
            width: 100%;
            text-align: center;
            margin-top: 30px;
        }
        .load-more-btn {
            background: linear-gradient(135deg, var(--primary), #0284c7);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
            font-family: 'Noto Sans Bengali', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .load-more-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.4);
            background: #fff;
        }
        .rating-badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.1);
            color: #fbbf24;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-top: 5px;
        }
        .cat-badge {
            display: inline-block;
            background: rgba(0, 210, 255, 0.1);
            color: var(--primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 5px;
        }

        /* ── Mobile Responsive ── */
        @media (max-width: 600px) {
            .top-bar { flex-direction: column; gap: 5px; text-align: center; }
            .bag-hero { padding: 20px 12px; }
            .bag-cats { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .bag-cat-card { padding: 15px 5px; }
            .bag-cat-icon { width: 35px; height: 35px; font-size: 1rem; }
            .bag-cat-card h4 { font-size: 0.75rem; }
            .trending-grid { grid-template-columns: 1fr; }
            .nb-search-input { padding: 15px 90px 15px 20px; font-size: 0.95rem; }
            .nb-mic-btn { right: 55px; }
            .news-filters { justify-content: center; }
        }
    </style>

<body>
    <div class="nb-page">

        </div>

        <main class="bag-hero">
            <div class="bag-logo">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <path d="M72 66 C72 40, 128 40, 128 66" stroke="#00d2ff" stroke-width="6" fill="none" stroke-linecap="round"/>
                    <rect x="44" y="66" width="112" height="86" rx="13" fill="none" stroke="#00d2ff" stroke-width="6"/>
                    <line x1="64" y1="92" x2="136" y2="92" stroke="#00d2ff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
                    <line x1="64" y1="112" x2="110" y2="112" stroke="#00d2ff" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
                    <circle cx="132" cy="128" r="19" stroke="#00d2ff" stroke-width="5" fill="#020617"/>
                    <line x1="145" y1="142" x2="158" y2="154" stroke="#00d2ff" stroke-width="5" stroke-linecap="round"/>
                </svg>
            </div>
            
            <h1 class="bag-title">NewsBag</h1>
            <p class="bag-sub">নির্ভরযোগ্য বাংলা সংবাদ ও গ্লোবাল নিউজ ডিসকভারি ইঞ্জিন</p>

            <div class="nb-search-wrap">
                <input type="search" id="bag-search" class="nb-search-input" placeholder="যেকোনো খবর বা বিষয় খুঁজুন..." autocomplete="off">
            

                <button class="nb-search-btn" id="bag-search-btn"><i class="fa fa-search"></i></button>
            </div>

            <div class="bag-tags">
                <div class="bag-tag" data-q="ব্রেকিং নিউজ"><i class="fa fa-bolt" style="color:#fbbf24"></i> ব্রেকিং নিউজ</div>
                <div class="bag-tag" data-q="আজকের বিশ্ব সংবাদ"><i class="fa fa-globe" style="color:#38bdf8"></i> বিশ্ব সংবাদ</div>
                <div class="bag-tag" data-q="ক্রিকেট আপডেট"><i class="fa fa-cricket-bat-ball" style="color:#4ade80"></i> ক্রিকেট</div>
                <div class="bag-tag" data-q="আর্টিফিশিয়াল ইন্টেলিজেন্স"><i class="fa fa-robot" style="color:#c084fc"></i> এআই টেক</div>
                <div class="bag-tag" data-q="শেয়ার বাজার আপডেট"><i class="fa fa-chart-line" style="color:#f472b6"></i> শেয়ার বাজার</div>

                <div class="bag-cat-card" data-q="খেলাধুলা">

                </div>
                <div class="bag-cat-card" data-q="বাণিজ্য সংবাদ">

            <div class="bag-trending-section">

    <script>
        const CX_BAG = 'c3f7fdad916b54b83';

        // 1. Dynamic Live Date & Time Greeting
        function updateTopBar() {
            const now = new Date();
            const hour = now.getHours();
            let greeting = "শুভ দিন!";
            if(hour >= 5 && hour < 12) greeting = "<span><i class='fa-regular fa-sun'></i> শুভ সকাল!</span> আজকের সর্বশেষ খবর জানুন।";
            else if(hour >= 12 && hour < 17) greeting = "<span><i class='fa-solid fa-cloud-sun'></i> শুভ দুপুর!</span> দুপুরের আপডেট দেখুন।";
            else if(hour >= 17 && hour < 20) greeting = "<span><i class='fa-solid fa-cloud-moon'></i> শুভ সন্ধ্যা!</span> সারাদিনের খবর একনজরে।";
            else greeting = "<span><i class='fa-solid fa-moon'></i> শুভ রাত্রি!</span> চোখ রাখুন ব্রেকিং নিউজে।";
            
            document.getElementById('greetingMsg').innerHTML = greeting;
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('liveDate').innerHTML = `<i class="fa-regular fa-calendar"></i> ` + now.toLocaleDateString('bn-BD', options);
        }
        updateTopBar();


        // ── NEW ADVANCED SECTION (API Fetch, Rating Sort, Endless Scroll, Filters) ──
        let globalNewsArray = [];
        let filteredNewsArray = [];
        let displayedCount = 0;
        const ITEMS_PER_LOAD = 6;
        let currentFilter = 'all';

        // --- স্মার্ট রেটিং ক্যালকুলেটর (নতুন লজিক) ---
        function calculateRealRating(title, pubDate) {
            let score = 7.5; // বেস স্কোর
            const hotWords = ["ব্রেকিং", "জরুরি", "রেকর্ড", "জয়", "সতর্কবার্তা", "বিপর্যয়", "অ্যালার্ট", "নতুন", "প্রথম"];
            const trendingTopics = ["এআই", "নির্বাচন", "ক্রিকেট", "বাজেট", "স্বর্ণ", "ডলার", "চমক"];

            // ১. শিরোনামে গুরুত্বপুর্ণ শব্দ থাকলে স্কোর বাড়বে
            hotWords.forEach(word => { if(title.includes(word)) score += 0.4; });
            trendingTopics.forEach(word => { if(title.includes(word)) score += 0.3; });

            // ২. সময়ের গুরুত্ব (যত নতুন নিউজ, তত বেশি রেটিং)
            const newsTime = new Date(pubDate).getTime();
            const nowTime = new Date().getTime();
            const diffHours = (nowTime - newsTime) / (1000 * 60 * 60);

            if (diffHours < 2) score += 1.2;
            else if (diffHours < 6) score += 0.8;
            else if (diffHours < 24) score += 0.4;

            return Math.min(score, 10.0).toFixed(1); // সর্বোচ্চ ১০.০
        }

        // National & International Fetch Functions (Simulating Google News via RSS2JSON)
        async function fetchDeshNewsAPI() {
            try {
                const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=বাংলাদেশ&hl=bn&gl=BD&ceid=BD:bn');
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                const data = await res.json();
                return data.items.map(item => ({...item, category: 'desh', rating: calculateRealRating(item.title, item.pubDate) }));
            } catch (e) { return []; }
        }

        async function fetchIntlNewsAPI() {
            try {
                const rssUrl = encodeURIComponent('https://feeds.bbci.co.uk/bengali/rss.xml'); // BBC for international general
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                const data = await res.json();
                return data.items.map(item => ({...item, category: 'intl', rating: calculateRealRating(item.title, item.pubDate) }));
            } catch (e) { return []; }
        }

        async function loadLiveTrending() {
            const grid = document.getElementById('trending-grid');
            grid.innerHTML = '<div class="loading-pulse">সর্বশেষ ট্রেন্ডিং ও জনপ্রিয় খবর সংগ্রহ করা হচ্ছে...</div>';

            const [deshNews, intlNews] = await Promise.all([fetchDeshNewsAPI(), fetchIntlNewsAPI()]);
            let combined = [...deshNews, ...intlNews];

            if (combined.length === 0) {
                combined = generateEndlessFallbackData(0, 20); 
            }

            // রেটিং অনুসারে হাইপ ক্যালকুলেটেড নিউজ সবার আগে থাকবে
            combined.sort((a, b) => parseFloat(b.rating) - parseFloat(a.rating));

            globalNewsArray = combined;
            filteredNewsArray = [...globalNewsArray];
            
            grid.innerHTML = '';
            displayedCount = 0;
            loadMoreItems();

            document.getElementById('load-more-container').style.display = 'block';
        }

        function loadMoreItems() {
            const grid = document.getElementById('trending-grid');
            const newItems = filteredNewsArray.slice(displayedCount, displayedCount + ITEMS_PER_LOAD);

            if (newItems.length === 0) {
                const extraData = generateEndlessFallbackData(filteredNewsArray.length, ITEMS_PER_LOAD, currentFilter);
                extraData.sort((a, b) => parseFloat(b.rating) - parseFloat(a.rating));
                filteredNewsArray = filteredNewsArray.concat(extraData);
                loadMoreItems();
                return;
            }

            newItems.forEach((item, index) => {
                const rank = displayedCount + index + 1;
                const div = document.createElement('div');
                div.className = 'trend-card';
                div.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:center;">
                        <span class="trend-num">${rank}</span>
                    </div>
                    <div style="display:flex; flex-direction:column; width:100%;">
                        <span class="trend-text">${item.title}</span>
                        <div>
                            <span class="rating-badge"><i class="fa fa-fire" style="color:#ff4500"></i> ${item.rating}</span>
                            <span class="cat-badge">${item.category === 'desh' ? 'বাংলাদেশ' : 'আন্তর্জাতিক'}</span>
                        </div>
                    </div>
                `;
                div.addEventListener('click', () => goSearch(item.title));
                grid.appendChild(div);
            });

            displayedCount += newItems.length;
        }

        // Filtering Logic
        function filterNews(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');

            if (type === 'all') {
                filteredNewsArray = [...globalNewsArray];
            } else {
                filteredNewsArray = globalNewsArray.filter(item => item.category === type);
            }
            
            filteredNewsArray.sort((a, b) => parseFloat(b.rating) - parseFloat(a.rating));

            document.getElementById('trending-grid').innerHTML = '';
            displayedCount = 0;
            loadMoreItems();
        }

        // Endless Data Generator (Fallback)
        function generateEndlessFallbackData(offset, amount, specificCategory = 'all') {
            const staticTitles = [
                "দেশের বাজারে নতুন রেকর্ড, শেয়ার বাজারে ঊর্ধ্বমুখী প্রবণতা",
                "বিশ্ব অর্থনীতিতে নতুন মোড়, এশিয়ান মার্কেটে প্রভাব",
                "কৃত্রিম বুদ্ধিমত্তার নতুন আপডেট, চমকপ্রদ এআই প্রযুক্তি",
                "ক্রিকেট দলের নতুন সাফল্য ও ট্রফি জয়",
                "ফ্রিল্যান্সিংয়ে বাংলাদেশীদের আরও এক নতুন মাইলফলক",
                "ইউরোপ ও আমেরিকায় নতুন ভিসা নীতির আপডেট"
            ];
            let data = [];
            for (let i = 0; i < amount; i++) {
                let cat = specificCategory === 'all' ? (Math.random() > 0.5 ? 'desh' : 'intl') : specificCategory;
                let title = staticTitles[Math.floor(Math.random() * staticTitles.length)];
                data.push({
                    title: `${title} (আপডেট ${offset + i + 1})`,
                    category: cat,
                    rating: (Math.random() * 1.5 + 7.5).toFixed(1),
                    pubDate: new Date().toISOString()
                });
            }
            return data;
        }

        loadLiveTrending();

        function goSearch(q) {
            const query = (q || document.getElementById('bag-search').value).trim();
            if (!query) return;
            window.location.href = `./search.html?cx=${encodeURIComponent(CX_BAG)}&q=${encodeURIComponent(query)}&brand=NewsBag&sort=date`;
        }

        document.getElementById('bag-search-btn').addEventListener('click', () => goSearch());
        document.getElementById('bag-search').addEventListener('keydown', e => {
            if (e.key==='Enter') goSearch();
        });

        document.querySelectorAll('.bag-tag, .bag-cat-card').forEach(el => {
            el.addEventListener('click', () => goSearch(el.dataset.q));
        });
    </script>
</body>
