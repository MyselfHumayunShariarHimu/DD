<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+Bengali:wght@400;700&display=swap');

:root {
  --primary: #2563eb;
  --bg: #0f172a;
  --card-bg: #1e293b;
  --border: #334155;
  --text-main: #f8fafc;

body.light {
  --bg: #f1f5f9;
  --card-bg: #ffffff;
  --border: #cbd5e1;

  --text-muted: #475569;

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text-main);
  transition: background 0.2s ease;
  min-height: 100vh;
  line-height: 1.5;
}

/* --- Sharp Header --- */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 5%;
  background: var(--card-bg);
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1.5px solid var(--border);
}

.logo {
  font-weight: 800;
  font-size: 22px;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.navbar {
  display: flex;
  gap: 8px;
  align-items: center;
}

select#siteSelect {
  background: var(--bg);
  color: var(--text-main);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 14px;
  outline: none;
  cursor: pointer;
}

#toggleTheme {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-main);
  width: 36px;
  height: 36px;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* --- Sharp Category Bar --- */

  display: flex;

</div>

  <div class="navbar">
    <select id="siteSelect"></select>

  </div>
</header>

<div class="category-bar" id="categories"></div>

<div class="main-view">
  <div class="viewer-header">
    <h2 id="viewerTitle">Latest News</h2>
    <button id="openNewTab">Open Full Site</button>
  </div>
  <div class="iframe-wrap">
    <iframe id="siteFrame" src="about:blank" title="NewsBD Hub" loading="lazy"></iframe>
  </div>
</div>

<footer>
  <a href="./newsbdhub.html" target="_blank">NewsBDHub</a> Extension of <a href="./index.html" target="_blank">NewsBD</a>
</footer>

<script>
// --- [Core Logic: Unchanged] ---
const SITES = {
  "প্রথম আলো":{base:"https://www.prothomalo.com",categories:{"মূলপাতা":"/","বাংলাদেশ":"/bangladesh","রাজনীতি":"/politics","বিনোদন":"/entertainment","খেলাধুলা":"/sports"}},
  "যুগান্তর":{base:"https://www.jugantor.com",categories:{"মূলপাতা":"/","বাংলাদেশ":"/bangladesh","রাজনীতি":"/politics","বিনোদন":"/entertainment","খেলাধুলা":"/sports"}},
  "ইনকিলাব":{base:"https://www.dailyinqilab.com",categories:{"মূলপাতা":"/","বাংলাদেশ":"/","রাজনীতি":"/","খেলাধুলা":"/sports"}},
  "দৈনিক জনকণ্ঠ":{base:"https://www.dailyjanakantha.com",categories:{"মূলপাতা":"/","বাংলাদেশ":"/","রাজনীতি":"/","বিনোদন":"/entertainment"}},
  "সমকাল":{base:"https://samakal.com",categories:{"মূলপাতা":"/","বাংলাদেশ":"/country","রাজনীতি":"/politics","খেলাধুলা":"/sports"}},
  "BDNews24":{base:"https://bdnews24.com",categories:{"মূলপাতা":"/","বাংলাদেশ":"/bangladesh","রাজনীতি":"/politics","খেলাধুলা":"/sports"}}
};

const siteSelect = document.getElementById('siteSelect');
const categoriesEl = document.getElementById('categories');
const siteFrame = document.getElementById('siteFrame');
const viewerTitle = document.getElementById('viewerTitle');
const openNewTabBtn = document.getElementById('openNewTab');

let activeSite = Object.keys(SITES)[0];
let activeCategory = Object.keys(SITES[activeSite].categories)[0];

function renderSiteOptions(){
  siteSelect.innerHTML = '';
  Object.keys(SITES).forEach(site=>{
    const opt = document.createElement('option');
    opt.value = site;
    opt.textContent = site;
    siteSelect.appendChild(opt);
  });
  siteSelect.value = activeSite;
}

siteSelect.addEventListener('change', e=>{
  activeSite = e.target.value;
  activeCategory = Object.keys(SITES[activeSite].categories)[0];
  renderCategories();
  loadFrame();
});

function renderCategories(){
  categoriesEl.innerHTML='';
  const cats = SITES[activeSite].categories;
  Object.entries(cats).forEach(([label,path])=>{
    const btn = document.createElement('div');
    btn.className='cat-btn';
    btn.textContent = label;
    btn.addEventListener('click',()=>{
      activeCategory=label;
      loadFrame();
    });
    categoriesEl.appendChild(btn);
  });
}

function getFullUrl(){ 
  const path = SITES[activeSite].categories[activeCategory];
  const base = SITES[activeSite].base;
  if(!path) return base;
  if(base.endsWith('/') && path.startsWith('/')) return base + path.slice(1);
  if(!base.endsWith('/') && !path.startsWith('/')) return base + '/' + path;
  return base + path;
}

function loadFrame(){
  const url = getFullUrl();
  siteFrame.src = url;
  viewerTitle.textContent = activeCategory;
}

openNewTabBtn.addEventListener('click', ()=>{ window.open(getFullUrl(),'_blank'); });

document.getElementById('toggleTheme').addEventListener('click', ()=>{
  const isLight = document.body.classList.toggle('light');
  document.getElementById('toggleTheme').textContent = isLight ? '🌙' : '☀️';
});

renderSiteOptions();
renderCategories();
loadFrame();
</script>
